services:
  nginx:
    build: ./infra/nginx
    ports:
      - "8088:80"
    depends_on:
      - web
      - api-gateway
    networks:
      - soundcloud

  web:
    build: ./web
    environment:
      VITE_API_BASE_URL: http://localhost:8088/api
    ports:
      - "5173:5173"
    networks:
      - soundcloud

  api-gateway:
    build: ./services/api-gateway
    env_file:
      - .env
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8000
      TRACKS_SERVICE_URL: http://tracks-service:8000
      UPLOAD_SERVICE_URL: http://upload-service:8000
      SOCIAL_SERVICE_URL: http://social-service:8000
    ports:
      - "8000:8000"
    depends_on:
      - identity-service
      - tracks-service
      - upload-service
      - social-service
    networks:
      - soundcloud

  identity-service:
    build: ./services/identity-service
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    networks:
      - soundcloud

  tracks-service:
    build: ./services/tracks-service
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      - postgres
    networks:
      - soundcloud

  upload-service:
    build: ./services/upload-service
    env_file:
      - .env
    ports:
      - "8003:8000"
    depends_on:
      - redis
      - minio
    networks:
      - soundcloud

  social-service:
    build: ./services/social-service
    env_file:
      - .env
    ports:
      - "8004:8000"
    depends_on:
      - postgres
    networks:
      - soundcloud

  processing-worker:
    build: ./services/processing-worker
    env_file:
      - .env
    depends_on:
      - redis
      - minio
    networks:
      - soundcloud

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-soundcloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soundcloud

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - soundcloud

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - soundcloud

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
      mc mb -p local/${MINIO_BUCKET:-tracks} || true;
      mc anonymous set download local/${MINIO_BUCKET:-tracks} || true;
      exit 0;
      "
    networks:
      - soundcloud

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  soundcloud:
    driver: bridge
